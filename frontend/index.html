<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PULSE — Coaching Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #09090b;
      --surface: #111113;
      --surface2: #18181c;
      --surface3: #1e1e23;
      --border: #27272d;
      --border2: #32323a;
      --amber: #f5a623;
      --amber-dim: rgba(245,166,35,0.10);
      --amber-glow: rgba(245,166,35,0.25);
      --green: #4ade80;
      --green-dim: rgba(74,222,128,0.10);
      --red: #f87171;
      --red-dim: rgba(248,113,113,0.10);
      --blue: #60a5fa;
      --blue-dim: rgba(96,165,250,0.10);
      --purple: #a78bfa;
      --purple-dim: rgba(167,139,250,0.10);
      --text: #e4e4e8;
      --text2: #a1a1aa;
      --muted: #52525e;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 70% -5%,rgba(245,166,35,0.04),transparent),radial-gradient(ellipse 40% 30% at 10% 80%,rgba(96,165,250,0.03),transparent);pointer-events:none;z-index:0;}
    body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");pointer-events:none;z-index:0;}

    .auth{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;position:relative;z-index:1;}
    .auth-box{width:100%;max-width:360px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2.5rem;animation:slideUp .5s cubic-bezier(.16,1,.3,1);}
    .brand{font-family:'Syne',sans-serif;font-size:2.4rem;font-weight:800;color:var(--amber);letter-spacing:-.06em;line-height:1;}
    .brand-tagline{font-size:.62rem;color:var(--muted);letter-spacing:.2em;text-transform:uppercase;margin-bottom:2.5rem;margin-top:.2rem;}

    label{display:block;font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:.3rem;}
    input,select,textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);padding:.65rem .9rem;font-family:'DM Mono',monospace;font-size:.82rem;outline:none;transition:border-color .15s,box-shadow .15s;margin-bottom:1rem;}
    input:focus,select:focus,textarea:focus{border-color:var(--amber);box-shadow:0 0 0 3px var(--amber-dim);}
    textarea{resize:vertical;min-height:80px;line-height:1.6;}
    select option{background:var(--surface2);}

    .btn{display:inline-flex;align-items:center;gap:.4rem;padding:.55rem 1.1rem;border-radius:7px;border:none;cursor:pointer;font-family:'DM Mono',monospace;font-size:.78rem;font-weight:500;transition:all .15s;white-space:nowrap;}
    .btn-primary{background:var(--amber);color:#000;}
    .btn-primary:hover{background:#f0b840;transform:translateY(-1px);box-shadow:0 4px 20px rgba(245,166,35,0.3);}
    .btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border);}
    .btn-ghost:hover{color:var(--text);border-color:var(--border2);background:var(--surface2);}
    .btn-danger{background:var(--red-dim);color:var(--red);border:1px solid rgba(248,113,113,.2);}
    .btn-danger:hover{background:rgba(248,113,113,.18);}
    .btn-ai{background:linear-gradient(135deg,rgba(167,139,250,.15),rgba(96,165,250,.15));color:var(--purple);border:1px solid rgba(167,139,250,.25);}
    .btn-ai:hover{background:linear-gradient(135deg,rgba(167,139,250,.25),rgba(96,165,250,.25));border-color:rgba(167,139,250,.4);}
    .btn-sm{padding:.32rem .7rem;font-size:.7rem;}
    .btn-full{width:100%;justify-content:center;}
    .btn:disabled{opacity:.45;cursor:not-allowed;transform:none !important;}

    .app{display:grid;grid-template-columns:220px 1fr;min-height:100vh;position:relative;z-index:1;}
    .sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:1.5rem 0;position:sticky;top:0;height:100vh;overflow-y:auto;}
    .sidebar-brand{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;color:var(--amber);letter-spacing:-.05em;padding:0 1.4rem;margin-bottom:.3rem;}
    .sidebar-sub{font-size:.58rem;color:var(--muted);letter-spacing:.16em;text-transform:uppercase;padding:0 1.4rem;margin-bottom:2rem;}
    .nav-group{font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);padding:.6rem 1.4rem .3rem;}
    .nav-item{display:flex;align-items:center;gap:.7rem;padding:.65rem 1.4rem;font-size:.76rem;color:var(--text2);cursor:pointer;transition:all .15s;border-left:2px solid transparent;user-select:none;}
    .nav-item:hover{color:var(--text);background:var(--surface2);}
    .nav-item.active{color:var(--amber);border-left-color:var(--amber);background:var(--amber-dim);}
    .nav-icon{font-size:.9rem;width:16px;text-align:center;}
    .sidebar-footer{margin-top:auto;padding:1.1rem 1.4rem;border-top:1px solid var(--border);}
    .user-chip{display:flex;align-items:center;gap:.7rem;margin-bottom:.8rem;}
    .avatar{width:32px;height:32px;border-radius:50%;background:var(--amber);color:#000;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:.72rem;flex-shrink:0;}
    .user-info .uname{font-size:.78rem;font-weight:500;color:var(--text);}
    .user-info .urole{font-size:.6rem;color:var(--amber);text-transform:uppercase;letter-spacing:.1em;}
    .main{padding:2rem;overflow-y:auto;}

    .ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:2rem;gap:1rem;}
    .ph-title{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;letter-spacing:-.03em;line-height:1.1;}
    .ph-sub{font-size:.7rem;color:var(--muted);margin-top:.3rem;}
    .ph-actions{display:flex;gap:.6rem;flex-shrink:0;}

    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.75rem;}
    .stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.25rem;transition:border-color .2s,transform .2s;}
    .stat:hover{border-color:var(--border2);transform:translateY(-2px);}
    .stat-label{font-size:.6rem;text-transform:uppercase;letter-spacing:.15em;color:var(--muted);margin-bottom:.5rem;}
    .stat-value{font-family:'Syne',sans-serif;font-size:2.2rem;font-weight:800;line-height:1;}
    .stat-sub{font-size:.68rem;color:var(--muted);margin-top:.35rem;}
    .c-amber{color:var(--amber);}
    .c-green{color:var(--green);}
    .c-red{color:var(--red);}
    .c-blue{color:var(--blue);}
    .c-purple{color:var(--purple);}
    .c-muted{color:var(--muted);}

    .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:1rem;}
    .card-head{display:flex;align-items:center;justify-content:space-between;padding:1.1rem 1.4rem;border-bottom:1px solid var(--border);}
    .card-title{font-family:'Syne',sans-serif;font-size:.95rem;font-weight:700;}
    .card-sub{font-size:.68rem;color:var(--muted);margin-top:.1rem;}
    .card-body{padding:1.4rem;}

    .tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
    table{width:100%;border-collapse:collapse;}
    th{text-align:left;padding:.65rem 1.2rem;font-size:.6rem;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);background:var(--surface2);font-weight:500;}
    td{padding:.85rem 1.2rem;font-size:.78rem;border-top:1px solid var(--border);}
    tr:hover td{background:rgba(255,255,255,.015);}

    .badge{display:inline-flex;align-items:center;gap:.3rem;padding:.2rem .6rem;border-radius:5px;font-size:.6rem;font-weight:500;text-transform:uppercase;letter-spacing:.08em;}
    .badge-open{background:var(--red-dim);color:var(--red);border:1px solid rgba(248,113,113,.2);}
    .badge-in_progress{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(245,166,35,.2);}
    .badge-closed{background:var(--green-dim);color:var(--green);border:1px solid rgba(74,222,128,.2);}
    .badge-active{background:var(--green-dim);color:var(--green);border:1px solid rgba(74,222,128,.2);}
    .badge-inactive{background:rgba(82,82,94,.1);color:var(--muted);border:1px solid var(--border);}

    .kpi-tag{display:inline-flex;align-items:center;gap:.3rem;padding:.2rem .55rem;border-radius:4px;font-size:.62rem;font-weight:500;margin:.15rem;}
    .kpi-tag.pos{background:var(--green-dim);color:var(--green);border:1px solid rgba(74,222,128,.2);}
    .kpi-tag.neg{background:var(--red-dim);color:var(--red);border:1px solid rgba(248,113,113,.2);}
    .kpi-tag.neu{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(245,166,35,.2);}

    .behavior-grid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:1rem;}
    .behavior-card{background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:.9rem 1rem;cursor:pointer;transition:all .2s;user-select:none;}
    .behavior-card:hover{border-color:var(--border2);}
    .behavior-card.selected{background:var(--amber-dim);border-color:var(--amber);}
    .behavior-card.selected .bname{color:var(--amber);}
    .bname{font-size:.8rem;font-weight:500;margin-bottom:.2rem;transition:color .15s;}
    .bfull{font-size:.65rem;color:var(--muted);margin-bottom:.5rem;line-height:1.4;}

    .coaching-output{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:1.5rem;}
    .co-section{margin-bottom:1.4rem;}
    .co-section:last-child{margin-bottom:0;}
    .co-label{font-size:.6rem;text-transform:uppercase;letter-spacing:.15em;color:var(--amber);margin-bottom:.6rem;display:flex;align-items:center;gap:.4rem;}
    .co-content{font-size:.8rem;line-height:1.85;color:var(--text2);}
    .co-steps{list-style:none;padding:0;}
    .co-steps li{padding:.45rem 0;border-bottom:1px solid var(--border);font-size:.78rem;color:var(--text2);display:flex;gap:.8rem;line-height:1.65;}
    .co-steps li:last-child{border-bottom:none;}
    .co-steps li::before{content:attr(data-n);color:var(--amber);font-family:'Syne',sans-serif;font-weight:700;flex-shrink:0;min-width:16px;}

    .impact-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;}
    .impact-kpi{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem;text-align:center;}
    .impact-kpi-name{font-size:.6rem;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);margin-bottom:.4rem;}
    .impact-kpi-arrow{font-size:1.8rem;margin-bottom:.3rem;line-height:1;}
    .impact-kpi-text{font-size:.66rem;color:var(--text2);line-height:1.55;}

    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(6px);padding:1rem;}
    .modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:2rem;width:100%;max-width:680px;max-height:92vh;overflow-y:auto;animation:slideUp .3s cubic-bezier(.16,1,.3,1);}
    .modal-title{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:800;margin-bottom:.25rem;}
    .modal-sub{font-size:.7rem;color:var(--muted);margin-bottom:1.5rem;}
    .modal-section{font-size:.6rem;text-transform:uppercase;letter-spacing:.15em;color:var(--amber);margin:1.25rem 0 .6rem;padding-bottom:.35rem;border-bottom:1px solid var(--border);}
    .modal-grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 1rem;}
    .modal-actions{display:flex;gap:.75rem;margin-top:1.5rem;padding-top:1.25rem;border-top:1px solid var(--border);}
    .span2{grid-column:span 2;}

    .ai-loading{display:flex;align-items:center;gap:.8rem;padding:2rem 1.4rem;color:var(--purple);font-size:.8rem;}
    .ai-dots{display:flex;gap:.3rem;}
    .ai-dots span{width:7px;height:7px;border-radius:50%;background:var(--purple);animation:pulse 1.2s infinite;}
    .ai-dots span:nth-child(2){animation-delay:.2s;}
    .ai-dots span:nth-child(3){animation-delay:.4s;}

    .step-bar{display:flex;gap:.5rem;margin-bottom:1.75rem;align-items:center;}
    .step-item{display:flex;align-items:center;gap:.5rem;padding:.4rem .9rem;border-radius:6px;font-size:.72rem;cursor:pointer;}
    .step-sep{width:20px;height:1px;background:var(--border);flex-shrink:0;}

    .search-row{display:flex;gap:.75rem;margin-bottom:1.25rem;align-items:center;}
    .search-wrap{position:relative;flex:1;}
    .search-wrap input{margin-bottom:0;padding-left:2.1rem;}
    .search-icon{position:absolute;left:.75rem;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.85rem;pointer-events:none;}

    .empty,.loading{padding:4rem;text-align:center;color:var(--muted);font-size:.8rem;}
    .error-msg{color:var(--red);font-size:.73rem;margin-bottom:.85rem;padding:.6rem .8rem;background:var(--red-dim);border:1px solid rgba(248,113,113,.2);border-radius:6px;}
    .hint-box{font-size:.7rem;color:var(--muted);background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:.8rem .9rem;margin-bottom:1rem;line-height:1.8;}
    .divider{height:1px;background:var(--border);margin:1.25rem 0;}

    .kpi-bar-row{display:flex;align-items:center;gap:.75rem;margin-bottom:.55rem;}
    .kpi-bar-label{font-size:.68rem;color:var(--text2);width:80px;flex-shrink:0;}
    .kpi-bar-track{flex:1;height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;}
    .kpi-bar-fill{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.16,1,.3,1);}
    .kpi-bar-val{font-size:.68rem;color:var(--text2);width:35px;text-align:right;flex-shrink:0;}

    .toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:.85rem 1.2rem;font-size:.78rem;z-index:9998;animation:slideUp .3s cubic-bezier(.16,1,.3,1);max-width:300px;box-shadow:0 8px 32px rgba(0,0,0,.4);}
    .toast.success{border-color:rgba(74,222,128,.35);color:var(--green);}
    .toast.error{border-color:rgba(248,113,113,.35);color:var(--red);}

    @keyframes slideUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulse{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}

    @media(max-width:768px){
      .app{grid-template-columns:1fr;}
      .sidebar{display:none;}
      .stats{grid-template-columns:1fr 1fr;}
      .modal-grid2{grid-template-columns:1fr;}
      .span2{grid-column:span 1;}
      .behavior-grid{grid-template-columns:1fr;}
      .impact-grid{grid-template-columns:1fr;}
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="module">
import{createElement as h,useState,useEffect,useCallback,Fragment}from'https://esm.sh/react@18';
import{createRoot}from'https://esm.sh/react-dom@18/client';

const API = 'https://pulse-app-07wd.onrender.com/api';

// ── KNOWLEDGE BASE ────────────────────────────────────────────────────────────
const BEHAVIORS = [
  {
    id:'lara', name:'LARA', full:'Listen Actively & Respond Appropriately',
    kpiImpact:{fcr:'pos',csat:'pos',nps:'pos'},
  },
  {
    id:'ownership', name:'Take Ownership', full:'Take Ownership',
    kpiImpact:{fcr:'pos',csat:'pos',nps:'pos'},
  },
  {
    id:'warm', name:'Be Warm & Friendly', full:'Be Warm & Friendly',
    kpiImpact:{fcr:'neu',csat:'pos',nps:'pos'},
  },
  {
    id:'needs', name:'Discover Needs', full:'Discover Needs',
    kpiImpact:{fcr:'pos',csat:'pos',nps:'pos'},
  },
  {
    id:'expectations', name:'Setting Expectations', full:'Setting Expectations',
    kpiImpact:{fcr:'pos',csat:'pos',nps:'neu'},
  },
];

const KPI_INFO = {
  fcr:  {label:'FCR',     full:'First Call Resolution',       color:'var(--green)', unit:'%', good:80},
  csat: {label:'CSAT',    full:'Customer Satisfaction',       color:'var(--blue)',  unit:'%', good:85},
  nps:  {label:'MES NPS', full:'Member Experience Score NPS', color:'var(--amber)', unit:'',  good:50},
};

// ── API ───────────────────────────────────────────────────────────────────────
const apiFetch = async (path, opts={}) => {
  const token = localStorage.getItem('pulse_token');
  const res = await fetch(API+path,{
    ...opts,
    headers:{'Content-Type':'application/json',...(token?{Authorization:`Bearer ${token}`}:{}),...(opts.headers||{})}
  });
  const data = await res.json();
  if(!res.ok) throw new Error(data.error||'Error');
  return data;
};

// ── TOAST ─────────────────────────────────────────────────────────────────────
let _toast;
const toast = (msg,type='success')=>{ _toast&&_toast({msg,type}); setTimeout(()=>_toast&&_toast(null),3500); };
function Toast(){
  const[t,setT]=useState(null);
  _toast=setT;
  if(!t)return null;
  return h('div',{className:`toast ${t.type}`},t.msg);
}

// ── AUTH ──────────────────────────────────────────────────────────────────────
function AuthPage({onLogin}){
  const[form,setForm]=useState({email:'alfredo@pulse.com',password:'pulse123'});
  const[err,setErr]=useState('');
  const[loading,setLoading]=useState(false);
  const set=k=>e=>setForm(f=>({...f,[k]:e.target.value}));
  const submit=async()=>{
    setErr('');setLoading(true);
    try{
      const d=await apiFetch('/auth/login',{method:'POST',body:JSON.stringify(form)});
      localStorage.setItem('pulse_token',d.token);
      onLogin(d.user);
    }catch(e){setErr(e.message);}
    setLoading(false);
  };
  return h('div',{className:'auth'},
    h('div',{className:'auth-box'},
      h('div',{className:'brand'},'PULSE'),
      h('div',{className:'brand-tagline'},'Coaching Intelligence · MedSupp'),
      err&&h('div',{className:'error-msg'},err),
      h('label',null,'Email'),
      h('input',{type:'email',value:form.email,onChange:set('email')}),
      h('label',null,'Password'),
      h('input',{type:'password',value:form.password,onChange:set('password'),onKeyDown:e=>e.key==='Enter'&&submit()}),
      h('button',{className:'btn btn-primary btn-full',onClick:submit,disabled:loading},loading?'Signing in…':'Sign In →'),
      h('div',{className:'hint-box'},'🔑 alfredo@pulse.com / pulse123',h('br',null),'🔑 admin@pulse.com / admin123')
    )
  );
}

// ── SIDEBAR ───────────────────────────────────────────────────────────────────
function Sidebar({user,page,setPage,onLogout}){
  const nav=[
    {id:'dashboard',icon:'◈',label:'Dashboard'},
    {id:'new_coaching',icon:'✦',label:'New Coaching'},
    {id:'coachings',icon:'◉',label:'Coaching History'},
    {id:'agents',icon:'⊞',label:'Agents'},
  ];
  return h('aside',{className:'sidebar'},
    h('div',{className:'sidebar-brand'},'PULSE'),
    h('div',{className:'sidebar-sub'},'Coaching Intelligence'),
    h('div',{className:'nav-group'},'Navigation'),
    nav.map(n=>h('div',{key:n.id,className:`nav-item ${page===n.id?'active':''}`,onClick:()=>setPage(n.id)},
      h('span',{className:'nav-icon'},n.icon),n.label
    )),
    h('div',{className:'sidebar-footer'},
      h('div',{className:'user-chip'},
        h('div',{className:'avatar'},user.name[0]),
        h('div',{className:'user-info'},
          h('div',{className:'uname'},user.name),
          h('div',{className:'urole'},user.role)
        )
      ),
      h('button',{className:'btn btn-ghost btn-full btn-sm',onClick:onLogout},'Sign Out')
    )
  );
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function Dashboard({setPage}){
  const[stats,setStats]=useState(null);
  useEffect(()=>{apiFetch('/stats').then(setStats).catch(()=>{});},[]);
  if(!stats)return h('div',{className:'loading'},'Loading dashboard…');
  const t=stats.team;
  const kpiClass=(val,good,isNps)=>{
    const n=Number(val);
    if(isNps)return n>=50?'c-green':n>=0?'c-amber':'c-red';
    return n>=good?'c-green':n>=(good-15)?'c-amber':'c-red';
  };
  const kpiColor=(val,good,isNps)=>{
    const n=Number(val);
    if(isNps)return n>=50?'var(--green)':n>=0?'var(--amber)':'var(--red)';
    return n>=good?'var(--green)':n>=(good-15)?'var(--amber)':'var(--red)';
  };

  return h('div',null,
    h('div',{className:'ph'},
      h('div',null,
        h('div',{className:'ph-title'},'Dashboard'),
        h('div',{className:'ph-sub'},new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'}))
      ),
      h('button',{className:'btn btn-primary',onClick:()=>setPage('new_coaching')},'✦ New Coaching')
    ),
    h('div',{className:'stats'},
      h('div',{className:'stat'},
        h('div',{className:'stat-label'},'⬡ MES NPS'),

// ── AI COACHING GENERATOR ─────────────────────────────────────────────────────
async function generateCoachingStructure({agent,behaviors,descriptions,kpis}){
  const behaviorDetails = behaviors.map(bid=>{
    const b=BEHAVIORS.find(x=>x.id===bid);
    const desc=descriptions[bid]||'No specific description provided';
    return `- ${b.full}: ${desc}`;
  }).join('\n');

  const prompt = `You are an expert call center coaching specialist for a Medicare Supplement (MedSupp) team.

Agent: ${agent.name} (${agent.employee_id})
Current KPIs — FCR: ${kpis.fcr||'N/A'}%, CSAT: ${kpis.csat||'N/A'}%, MES NPS: ${kpis.nps||'N/A'}

Behaviors to coach:
${behaviorDetails}

Respond ONLY with a valid JSON object, no markdown, no explanation:
{
  "opening": "2-3 sentence positive opening for the coaching conversation",
  "kpi_connection": "2-3 sentences connecting these behaviors directly to FCR, CSAT, and NPS impact",
  "observed_behaviors": ["observation 1", "observation 2", "observation 3"],
  "technique_tips": ["tip 1", "tip 2", "tip 3"],
  "action_plan": ["step 1 with timeframe", "step 2 with timeframe", "step 3 with timeframe"],
  "follow_up": "specific follow-up with timeframe and success metrics",
  "kpi_forecast": {
    "fcr": {"direction": "up|down|neutral", "reasoning": "one sentence"},
    "csat": {"direction": "up|down|neutral", "reasoning": "one sentence"},
    "nps": {"direction": "up|down|neutral", "reasoning": "one sentence"}
  }
}`;

  const res = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})
  });
  const data = await res.json();
  const text = data.content?.find(c=>c.type==='text')?.text||'{}';
  try{ return JSON.parse(text.replace(/```json|```/g,'').trim()); }
  catch{ return null; }
}

// ── COACHING HISTORY ──────────────────────────────────────────────────────────
function CoachingHistory(){
  const[coachings,setCoachings]=useState([]);
  const[loading,setLoading]=useState(true);
  const[search,setSearch]=useState('');
  const[filterStatus,setFilterStatus]=useState('');
  const[selected,setSelected]=useState(null);

  useEffect(()=>{
    apiFetch('/coachings').then(c=>{setCoachings(c);setLoading(false);}).catch(()=>setLoading(false));
  },[]);

  const del=async id=>{
    if(!confirm('Delete this coaching?'))return;
    await apiFetch(`/coachings/${id}`,{method:'DELETE'});
    setCoachings(c=>c.filter(x=>x.id!==id));
    if(selected?.id===id)setSelected(null);
    toast('Deleted','error');
  };

  const updateStatus=async(id,status)=>{
    await apiFetch(`/coachings/${id}`,{method:'PUT',body:JSON.stringify({status})});
    setCoachings(c=>c.map(x=>x.id===id?{...x,status}:x));
    if(selected?.id===id)setSelected(s=>({...s,status}));
    toast('Status updated');
  };

  const filtered=coachings.filter(c=>{
    const q=search.toLowerCase();
    return(!q||(c.agents?.name||'').toLowerCase().includes(q)||(c.call_id||'').toLowerCase().includes(q))&&
           (!filterStatus||c.status===filterStatus);
  });

  const kpiColor=(val,good,isNps)=>{
    if(val==null)return 'var(--muted)';
    const n=Number(val);
    if(isNps)return n>=50?'var(--green)':'var(--red)';
    return n>=good?'var(--green)':'var(--red)';
  };

  return h('div',null,
    h('div',{className:'ph'},
      h('div',null,
        h('div',{className:'ph-title'},'Coaching History'),
        h('div',{className:'ph-sub'},`${coachings.length} total sessions`)
      ),
      h('button',{className:'btn btn-ghost btn-sm',onClick:()=>window.open(API+'/export/excel?token='+localStorage.getItem('pulse_token'))},'↓ Export Excel')
    ),
    h('div',{className:'search-row'},
      h('div',{className:'search-wrap'},
        h('span',{className:'search-icon'},'⌕'),
        h('input',{value:search,onChange:e=>setSearch(e.target.value),placeholder:'Search by agent name or call ID…'})
      ),
      h('select',{value:filterStatus,onChange:e=>setFilterStatus(e.target.value),style:{margin:0,width:'150px'}},
        h('option',{value:''},'All statuses'),
        ['open','in_progress','closed'].map(s=>h('option',{key:s,value:s},s.replace('_',' ')))
      )
    ),
    loading?h('div',{className:'loading'},'Loading…'):
    h('div',{className:'tbl-wrap'},
      filtered.length===0?h('div',{className:'empty'},'No coachings found.'):
      h('table',null,
        h('thead',null,h('tr',null,
          ['Date','Agent','Call ID','FCR','CSAT','NPS','Behaviors','Status',''].map(c=>h('th',{key:c},c))
        )),
        h('tbody',null,
          filtered.map(c=>{
            const behaviorLine=(c.behavior_observed||'').split('\n')[0].replace('Behaviors: ','');
            return h('tr',{key:c.id},
              h('td',null,c.coaching_date),
              h('td',null,
                h('div',null,c.agents?.name||'—'),
                h('div',{style:{fontSize:'.62rem',color:'var(--muted)'}},c.agents?.employee_id)
              ),
              h('td',null,c.call_id||'—'),
              h('td',null,c.fcr_7days?h('span',{style:{color:kpiColor(c.fcr_7days,80)}},`${c.fcr_7days}%`):'—'),
              h('td',null,c.csat?h('span',{style:{color:kpiColor(c.csat,85)}},`${c.csat}%`):'—'),
              h('td',null,c.nps!=null?h('span',{style:{color:kpiColor(c.nps,50,true)}},c.nps):'—'),
              h('td',null,h('div',{style:{fontSize:'.65rem',color:'var(--muted)',maxWidth:'150px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},behaviorLine||'—')),
              h('td',null,h('span',{className:`badge badge-${c.status}`},c.status.replace('_',' '))),
              h('td',null,
                h('div',{style:{display:'flex',gap:'.35rem'}},
                  h('button',{className:'btn btn-ghost btn-sm',onClick:()=>setSelected(c)},'View'),
                  h('button',{className:'btn btn-danger btn-sm',onClick:()=>del(c.id)},'Del')
                )
              )
            );
          })
        )
      )
    ),

    selected&&h('div',{className:'overlay',onClick:e=>e.target===e.currentTarget&&setSelected(null)},
      h('div',{className:'modal'},
        h('div',{className:'modal-title'},`Coaching — ${selected.agents?.name}`),
        h('div',{className:'modal-sub'},`${selected.coaching_date} · Call ${selected.call_id||'N/A'}`),
        h('div',{style:{display:'flex',gap:'.5rem',marginBottom:'1rem'}},
          ['open','in_progress','closed'].map(s=>
            h('button',{key:s,className:`btn btn-sm ${selected.status===s?'btn-primary':'btn-ghost'}`,onClick:()=>updateStatus(selected.id,s)},s.replace('_',' '))
          )
        ),
        h('div',{className:'modal-section'},'KPIs at Time of Coaching'),
        h('div',{className:'impact-grid'},
          [['fcr_7days','FCR 7d',80,false],['csat','CSAT',85,false],['nps','MES NPS',50,true]].map(([k,label,good,isNps])=>{
            const val=selected[k];
            const isGood=val!=null&&Number(val)>=good;
            return h('div',{key:k,className:'impact-kpi'},
              h('div',{className:'impact-kpi-name'},label),
              h('div',{style:{fontSize:'1.4rem',fontFamily:'Syne,sans-serif',fontWeight:800,color:val==null?'var(--muted)':isGood?'var(--green)':'var(--red)'}},
                val!=null?(isNps?val:`${val}%`):'—'
              )
            );
          })
        ),
        selected.behavior_observed&&h('div',null,
          h('div',{className:'modal-section'},'Behavior Observations'),
          h('div',{style:{fontSize:'.78rem',color:'var(--text2)',lineHeight:'1.8',background:'var(--surface2)',borderRadius:'8px',padding:'1rem'}},
            selected.behavior_observed.split('\n').map((line,i)=>h('div',{key:i},line||h('br')))
          )
        ),
        selected.action_plan&&h('div',null,
          h('div',{className:'modal-section'},'Action Plan'),
          h('div',{style:{fontSize:'.78rem',color:'var(--text2)',lineHeight:'1.8',background:'var(--surface2)',borderRadius:'8px',padding:'1rem'}},
            selected.action_plan.split('\n').map((line,i)=>h('div',{key:i},line||h('br')))
          )
        ),
        h('div',{style:{display:'flex',justifyContent:'flex-end',marginTop:'1.25rem'}},
          h('button',{className:'btn btn-ghost',onClick:()=>setSelected(null)},'Close')
        )
      )
    )
  );
}

// ── AGENTS ────────────────────────────────────────────────────────────────────
function Agents(){
  const[agents,setAgents]=useState([]);
  const[loading,setLoading]=useState(true);
  const[modal,setModal]=useState(null);
  const[search,setSearch]=useState('');
  const load=useCallback(async()=>{const a=await apiFetch('/agents');setAgents(a);setLoading(false);},[]);
  useEffect(()=>{load();},[load]);
  const del=async id=>{
    if(!confirm('Delete agent?'))return;
    await apiFetch(`/agents/${id}`,{method:'DELETE'});
    setAgents(a=>a.filter(x=>x.id!==id));
    toast('Agent deleted','error');
  };
  const onSave=(saved,isEdit)=>{
    if(isEdit)setAgents(a=>a.map(x=>x.id===saved.id?saved:x));
    else setAgents(a=>[...a,saved]);
    setModal(null);
    toast(isEdit?'Agent updated':'Agent created');
  };
  const filtered=agents.filter(a=>{
    const q=search.toLowerCase();
    return!q||a.name.toLowerCase().includes(q)||a.employee_id.toLowerCase().includes(q)||a.email.toLowerCase().includes(q);
  });
  return h('div',null,
    h('div',{className:'ph'},
      h('div',null,h('div',{className:'ph-title'},'Agents')),
      h('button',{className:'btn btn-primary',onClick:()=>setModal('new')},'+ New Agent')
    ),
    h('div',{className:'search-row'},
      h('div',{className:'search-wrap'},
        h('span',{className:'search-icon'},'⌕'),
        h('input',{value:search,onChange:e=>setSearch(e.target.value),placeholder:'Search by name, ID or email…'})
      )
    ),
    loading?h('div',{className:'loading'},'Loading…'):
    h('div',{className:'tbl-wrap'},
      filtered.length===0?h('div',{className:'empty'},'No agents found.'):
      h('table',null,
        h('thead',null,h('tr',null,['Name','Employee ID','Email','Team','Hire Date','Status',''].map(c=>h('th',{key:c},c)))),
        h('tbody',null,
          filtered.map(a=>h('tr',{key:a.id},
            h('td',null,h('div',{style:{display:'flex',alignItems:'center',gap:'.6rem'}},
              h('div',{className:'avatar',style:{width:'26px',height:'26px',fontSize:'.62rem'}},a.name[0]),a.name
            )),
            h('td',null,a.employee_id),
            h('td',null,a.email),
            h('td',null,a.team||'—'),
            h('td',null,a.hire_date||'—'),
            h('td',null,h('span',{className:`badge badge-${a.status}`},a.status)),
            h('td',null,h('div',{style:{display:'flex',gap:'.4rem'}},
              h('button',{className:'btn btn-ghost btn-sm',onClick:()=>setModal(a)},'Edit'),
              h('button',{className:'btn btn-danger btn-sm',onClick:()=>del(a.id)},'Del')
            ))
          ))
        )
      )
    ),
    modal&&h(AgentModal,{agent:modal==='new'?null:modal,onClose:()=>setModal(null),onSave})
  );
}

function AgentModal({agent,onClose,onSave}){
  const blank={name:'',employee_id:'',email:'',team:'MedSupp Team A',hire_date:'',status:'active'};
  const[form,setForm]=useState(agent||blank);
  const[err,setErr]=useState('');
  const[loading,setLoading]=useState(false);
  const setE=k=>e=>setForm(f=>({...f,[k]:e.target.value}));
  const submit=async()=>{
    if(!form.name||!form.employee_id||!form.email)return setErr('Name, Employee ID and Email are required.');
    setErr('');setLoading(true);
    try{
      let saved;
      if(agent)saved=await apiFetch(`/agents/${agent.id}`,{method:'PUT',body:JSON.stringify(form)});
      else saved=await apiFetch('/agents',{method:'POST',body:JSON.stringify(form)});
      onSave(saved,!!agent);
    }catch(e){setErr(e.message);}
    setLoading(false);
  };
  return h('div',{className:'overlay',onClick:e=>e.target===e.currentTarget&&onClose()},
    h('div',{className:'modal',style:{maxWidth:'440px'}},
      h('div',{className:'modal-title'},agent?'Edit Agent':'New Agent'),
      err&&h('div',{className:'error-msg'},err),
      h('label',null,'Full Name *'),h('input',{value:form.name,onChange:setE('name'),placeholder:'Maria González'}),
      h('label',null,'Employee ID *'),h('input',{value:form.employee_id,onChange:setE('employee_id'),placeholder:'EMP006'}),
      h('label',null,'Email *'),h('input',{type:'email',value:form.email,onChange:setE('email'),placeholder:'agent@company.com'}),
      h('label',null,'Team'),h('input',{value:form.team||'',onChange:setE('team'),placeholder:'MedSupp Team A'}),
      h('label',null,'Hire Date'),h('input',{type:'date',value:form.hire_date||'',onChange:setE('hire_date')}),
      h('label',null,'Status'),h('select',{value:form.status,onChange:setE('status')},
        h('option',{value:'active'},'Active'),h('option',{value:'inactive'},'Inactive')
      ),
      h('div',{className:'modal-actions'},
        h('button',{className:'btn btn-primary',onClick:submit,disabled:loading,style:{flex:1}},loading?'…':agent?'Save':'Create Agent'),
        h('button',{className:'btn btn-ghost',onClick:onClose},'Cancel')
      )
    )
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App(){
  const[user,setUser]=useState(null);
  const[page,setPage]=useState('dashboard');
  const[booting,setBooting]=useState(true);
  useEffect(()=>{
    const token=localStorage.getItem('pulse_token');
    if(token){apiFetch('/auth/me').then(u=>setUser(u)).catch(()=>localStorage.removeItem('pulse_token')).finally(()=>setBooting(false));}
    else setBooting(false);
  },[]);
  const logout=()=>{localStorage.removeItem('pulse_token');setUser(null);setPage('dashboard');};
  if(booting)return h('div',{className:'loading',style:{paddingTop:'45vh'}},'Loading…');
  if(!user)return h(Fragment,null,h(AuthPage,{onLogin:u=>setUser(u)}),h(Toast));
  const content={
    dashboard:h(Dashboard,{setPage}),
    new_coaching:h(NewCoaching,{user}),
    coachings:h(CoachingHistory),
    agents:h(Agents),
  }[page]||null;
  return h('div',{className:'app'},
    h(Sidebar,{user,page,setPage,onLogout:logout}),
    h('main',{className:'main'},content),
    h(Toast)
  );
}

createRoot(document.getElementById('root')).render(h(App));
</script>
